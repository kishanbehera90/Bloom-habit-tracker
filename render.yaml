services:
  - type: web
    name: bloom-habit-tracker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: DATABASE_URL
        sync: false
