services:
  - type: web
    name: bloom-habit-tracker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: bloom-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
